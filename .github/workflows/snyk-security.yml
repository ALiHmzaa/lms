name: Snyk PR Checks (with SARIF Upload)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  snyk-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Snyk
        run: npm install -g snyk

      # --- SCA Gate (Dependency vulnerabilities) ---
      - name: Snyk Open Source (SCA)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects --severity-threshold=high --org=${{ secrets.SNYK_ORG }}

      # --- SAST -> SARIF (Code vulnerabilities) ---
      # We don't fail the job here because we want to always upload SARIF to GitHub Code Scanning.
      - name: Snyk Code (SAST) - Generate SARIF
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test --sarif --org=${{ secrets.SNYK_ORG }} > snyk-code.sarif || true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif